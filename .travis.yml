git:
  depth: 3

language: c
os: linux
dist: bionic


env:
  global:
   # The next declaration is the encrypted COVERITY_SCAN_TOKEN, created
   #   via the "travis encrypt" command using the project repo's public key
   - secure: ""


addons:
  apt:
    packages:
      - libncursesw5-dev
      - libncurses5-dev
      - libgeoip-dev
      - autoconf
      - autotools-dev
      - libssl-dev
      - libmaxminddb-dev
      - gettext
      - autopoint
  coverity_scan:
    project:
      name: "cgzones/goaccess"
      description: "Build submitted via Travis CI"
    notification_email: cgzones@googlemail.com
    build_command_prepend: "autoreconf -fiv -Wall; ./configure --enable-utf8 --enable-geoip=mmdb --with-openssl; make clean"
    build_command: "make"
    branch_pattern: coverity_scan


script:
 - cat /home/travis/build/cgzones/goaccess/cov-int/scm_log.txt
